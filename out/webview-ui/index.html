<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSP will be injected by provider.ts -->
    <title>Custom Copy - Settings</title>
    <script>
      // VSCode API polyfill - will be replaced by actual VSCode API in webview
      if (typeof acquireVsCodeApi === 'undefined') {
        window.acquireVsCodeApi = function() {
          return {
            postMessage: function(msg) {
              console.log('Message to extension:', msg);
            },
            setState: function(state) {
              window.__vscodeState = state;
            },
            getState: function() {
              return window.__vscodeState || {};
            }
          };
        };
      }
    </script>
    <script type="module" crossorigin src="./assets/index.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
